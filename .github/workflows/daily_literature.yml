name: Daily Literature Alert

on:
  schedule:
    # Beijing time 08:30; GitHub Actions cron uses UTC.
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-literature:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python scripts/run_pipeline.py --mode daily

      - name: Commit updated cache and records
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update daily literature alert records"
          file_pattern: data/*.csv data/*.jsonl data/*.md logs/.gitkeep
